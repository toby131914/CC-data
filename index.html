<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>銷售計算工具</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">CAF <span>銷售計算工具</span></div>
    <nav class="tabs">
      <button class="tab active" onclick="switchTab('sale')">銷售結帳</button>
      <button class="tab" onclick="switchTab('discount')">折扣管理</button>
      <button class="tab" onclick="switchTab('refund')">退換貨</button>
      <button class="tab" onclick="switchTab('records')">銷售記錄</button>
    </nav>
  </div>
</header>

<main class="main">

  <!-- ===== SALE PANEL ===== -->
  <div class="panel active" id="panel-sale">
    <div class="grid2">
      <div>
        <div class="card">
          <h3>新增商品</h3>
          <div class="grid2">
            <div><label>商品名稱</label><input type="text" id="p-name" placeholder="例：咖啡拿鐵" /></div>
            <div><label>單價 (NT$)</label><input type="number" id="p-price" placeholder="0" min="0" /></div>
          </div>
          <div class="field-row">
            <div><label>數量</label><input type="number" id="p-qty" value="1" min="1" /></div>
            <button class="btn primary" onclick="addItem()">＋ 加入清單</button>
          </div>
        </div>

        <div class="card">
          <h3>套用折扣</h3>
          <div id="active-discounts"><div class="empty" style="padding:0.5rem">目前無可用折扣</div></div>
          <div style="margin-top:8px">
            <label>手動輸入折扣碼</label>
            <div class="field-row">
              <div><input type="text" id="disc-code" placeholder="輸入折扣碼" /></div>
              <button class="btn" onclick="applyCode()">套用</button>
            </div>
          </div>
          <div id="applied-disc" style="display:none">
            <div class="disc-tag" id="applied-disc-tag" style="cursor:default"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="card">
          <h3>訂單明細</h3>
          <div id="item-list"><div class="empty">尚未加入任何商品</div></div>
          <hr class="divider" />
          <div class="total-row"><span>小計</span><span id="t-subtotal">NT$ 0</span></div>
          <div class="total-row" id="t-disc-row" style="display:none">
            <span>折扣</span><span class="disc-val" id="t-disc-val">-NT$ 0</span>
          </div>
          <div class="total-row" id="t-tax-row">
            <span class="tax-label-row">
              <label class="toggle-label">
                <input type="checkbox" id="tax-toggle" checked onchange="updateTotals()" />
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
              </label>
              <span id="tax-label-text">稅金 5%</span>
            </span>
            <span id="t-tax">NT$ 0</span>
          </div>
          <hr class="divider" />
          <div class="total-row bold"><span>應付金額</span><span id="t-total">NT$ 0</span></div>
          <div class="grid2" style="margin-top:1rem">
            <div><label>實收金額 (NT$)</label><input type="number" id="paid" placeholder="0" oninput="calcChange()" /></div>
            <div><label>找零</label><input type="text" id="change" readonly placeholder="—" /></div>
          </div>
          <button class="btn primary full" onclick="checkout()" style="margin-top:8px">完成結帳</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== DISCOUNT PANEL ===== -->
  <div class="panel" id="panel-discount">
    <div class="grid2">
      <div class="card">
        <h3>建立新折扣</h3>
        <div class="grid2">
          <div><label>折扣名稱</label><input type="text" id="d-name" placeholder="例：週末特惠" /></div>
          <div><label>折扣碼</label><input type="text" id="d-code" placeholder="例：SALE20" /></div>
        </div>
        <div class="grid2">
          <div>
            <label>折扣類型</label>
            <select id="d-type" onchange="updateDiscType()">
              <option value="percent">百分比 (%)</option>
              <option value="fixed">固定金額 (NT$)</option>
            </select>
          </div>
          <div><label id="d-val-label">折扣值 (%)</label><input type="number" id="d-val" placeholder="0" min="0" /></div>
        </div>
        <div class="grid2">
          <div><label>開始日期</label><input type="date" id="d-start" /></div>
          <div><label>結束日期</label><input type="date" id="d-end" /></div>
        </div>
        <div class="grid2">
          <div><label>開始時間</label><input type="time" id="d-stime" /></div>
          <div><label>結束時間</label><input type="time" id="d-etime" /></div>
        </div>
        <div><label>最低消費金額 (NT$，留空不限)</label><input type="number" id="d-min" placeholder="0" /></div>
        <button class="btn primary full" onclick="addDiscount()">建立折扣</button>
      </div>
      <div class="card">
        <h3>折扣清單</h3>
        <div id="disc-list"><div class="empty">尚未建立任何折扣</div></div>
      </div>
    </div>
  </div>

  <!-- ===== REFUND PANEL ===== -->
  <div class="panel" id="panel-refund">
    <div class="grid2">
      <div>
        <div class="card">
          <h3>選擇原始訂單</h3>
          <label>訂單編號</label>
          <select id="ref-order" onchange="loadRefundOrder()">
            <option value="">— 請選擇訂單 —</option>
          </select>
          <div id="refund-orig" style="display:none">
            <hr class="divider" />
            <div class="section-title">原始訂單明細</div>
            <div id="orig-items"></div>
            <div class="total-row" style="margin-top:8px; font-weight:600; color:var(--text)">
              <span>原始總額</span><span id="orig-total"></span>
            </div>
          </div>
        </div>

        <div class="card" id="exchange-card" style="display:none">
          <h3>加入換貨商品</h3>
          <div class="grid3">
            <div><label>商品名稱</label><input type="text" id="ex-name" placeholder="換貨商品" /></div>
            <div><label>單價 (NT$)</label><input type="number" id="ex-price" placeholder="0" /></div>
            <div><label>數量</label><input type="number" id="ex-qty" value="1" min="1" /></div>
          </div>
          <button class="btn" onclick="addExchangeItem()">＋ 加入換貨</button>
          <div id="exchange-list" style="margin-top:12px"></div>
        </div>
      </div>

      <div class="card">
        <h3>退換貨明細</h3>
        <div id="refund-select"><div class="empty">請先選擇訂單</div></div>
        <div id="refund-result" style="display:none">
          <hr class="divider" />
          <div class="total-row"><span>退貨商品原價</span><span id="r-orig">NT$ 0</span></div>
          <div class="total-row"><span>換貨商品金額</span><span id="r-new">NT$ 0</span></div>
          <hr class="divider" />
          <div class="total-row bold">
            <span id="r-diff-label">應退金額</span>
            <span id="r-diff" style="color:var(--green)">NT$ 0</span>
          </div>
          <button class="btn primary full" onclick="processRefund()" style="margin-top:16px">確認退換貨</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== RECORDS PANEL ===== -->
  <div class="panel" id="panel-records">
    <div class="card">
      <h3>篩選條件</h3>
      <div class="filter-row">
        <div><label>開始日期</label><input type="date" id="f-start" /></div>
        <div><label>結束日期</label><input type="date" id="f-end" /></div>
        <div><label>開始時間</label><input type="time" id="f-stime" /></div>
        <div><label>結束時間</label><input type="time" id="f-etime" /></div>
        <div>
          <label>類型</label>
          <select id="f-type">
            <option value="">全部</option>
            <option value="sale">銷售</option>
            <option value="refund">退換貨</option>
          </select>
        </div>
        <button class="btn primary" onclick="filterRecords()" style="margin-bottom:0; align-self:flex-end">查詢</button>
        <button class="btn" onclick="clearFilter()" style="margin-bottom:0; align-self:flex-end">清除</button>
      </div>
    </div>

    <div class="grid4" style="margin-bottom:16px">
      <div class="metric"><div class="label">總筆數</div><div class="value" id="rec-count">0</div></div>
      <div class="metric"><div class="label">銷售總額</div><div class="value green" id="rec-sale">NT$ 0</div></div>
      <div class="metric"><div class="label">退款總額</div><div class="value red" id="rec-refund">NT$ 0</div></div>
      <div class="metric"><div class="label">淨收入</div><div class="value" id="rec-net">NT$ 0</div></div>
    </div>

    <div class="card">
      <div class="record-row record-header">
        <div>時間</div>
        <div>說明</div>
        <div>類型</div>
        <div>原始金額</div>
        <div>折扣</div>
        <div>實收 / 退款</div>
      </div>
      <div id="record-list"><div class="empty">尚無銷售記錄</div></div>
    </div>
  </div>

</main>
